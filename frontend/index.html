<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SJ Construct SystemsWeb</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

.dark{
background:#111827;
color:white;
}

.dark .card{
background:#1f2937;
color:white;
}

.dark input{
background:#374151;
color:white;
border:none;
}

.dark table{
color:white;
}

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
width:220px;
height:100vh;
background:#1f2937;
color:white;
position:fixed;
padding:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
background:#374151;
border:none;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#4b5563;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

input{
display:block;
margin-bottom:10px;
padding:8px;
width:300px;
}

button.action{
padding:10px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>



<div class="sidebar">

<div style="text-align:center">

<img src="logo.png" width="120">

<h3>SJ Systems</h3>

</div>

<button onclick="modoOscuro()">Modo oscuro</button>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('herramientas')">Herramientas</button>
<button onclick="mostrar('obras')">Obras</button>
<button onclick="mostrar('bodega')">Bodega</button>

</div>

<div class="main">

<div id="dashboard" class="card">

<div class="card">

<h2>Estado de Herramientas</h2>

<canvas id="graficoHerramientas" height="100"></canvas>

</div>

<h1>Dashboard</h1>

<button onclick="cargarDashboard()">Actualizar</button>

<div class="card">

<h2>Asignar Herramienta a Obra</h2>

<select id="selectHerramienta"></select>

<select id="selectObra"></select>

<button onclick="asignar()">Asignar</button>

</div>

<div style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px
">

<div class="card">
<h3>Total Herramientas</h3>
<h1 id="totalHerramientas">0</h1>
</div>

<div class="card">
<h3>En Bodega</h3>
<h1 id="enBodega">0</h1>
</div>

<div class="card">
<h3>En Obras</h3>
<h1 id="enObra">0</h1>
</div>

<div class="card">
<h3>Total Obras</h3>
<h1 id="totalObras">0</h1>
</div>

</div>

</div>

<div id="herramientas" class="card" style="display:none">

<h2>Crear Herramienta</h2>

<input id="nombre" placeholder="Nombre">
<input id="tipo" placeholder="Tipo">
<input id="serie" placeholder="Numero Serie">
<input id="marca" placeholder="Marca">
<input id="codigo" placeholder="Codigo Interno">

<button class="action" onclick="crearHerramienta()">Crear</button>

<h2>Lista</h2>

<button onclick="cargarHerramientas()">Actualizar</button>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Tipo</th>
<th>Serie</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tablaHerramientas"></tbody>

</table>

</div>

<div id="obras" class="card" style="display:none">

<h2>Crear Obra</h2>

<input id="obraNombre" placeholder="Nombre obra">
<input id="obraUbicacion" placeholder="Ubicacion">

<button class="action" onclick="crearObra()">Crear</button>

</div>

<div id="bodega" class="card" style="display:none">

<h2>Bodega Central</h2>

<button onclick="cargarBodega()">Ver herramientas disponibles</button>

<div id="listaBodega"></div>

</div>

</div>

<script>

let dark=false

function modoOscuro(){

dark=!dark

if(dark){

document.body.classList.add("dark")

}else{

document.body.classList.remove("dark")

}

}

const API="http://localhost:3000"

function mostrar(seccion){

document.getElementById("dashboard").style.display="none"
document.getElementById("herramientas").style.display="none"
document.getElementById("obras").style.display="none"
document.getElementById("bodega").style.display="none"

document.getElementById(seccion).style.display="block"

}

async function crearHerramienta(){

const data={
nombre:nombre.value,
tipo:tipo.value,
numeroSerie:serie.value,
marca:marca.value,
codigoInterno:codigo.value
}

await fetch(API+"/herramientas",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("Herramienta creada")

}

async function cargarHerramientas(){

const res=await fetch(API+"/herramientas")
const data=await res.json()

let html=""

data.forEach(h=>{

html+=`
<tr>
<td>${h.nombre}</td>
<td>${h.tipo}</td>
<td>${h.numeroSerie}</td>
<td>${h.estado}</td>
</tr>
`

})

tablaHerramientas.innerHTML=html

}

async function crearObra(){

const data={
nombre:obraNombre.value,
ubicacion:obraUbicacion.value
}

await fetch(API+"/obras",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("Obra creada")

}

async function cargarBodega(){

const res=await fetch(API+"/bodega")
const data=await res.json()

let html=""

data.forEach(h=>{

html+=`
<div>
<b>${h.nombre}</b>
<br>
Serie: ${h.numeroSerie}
<hr>
</div>
`

})

listaBodega.innerHTML=html

}

async function cargarDashboard(){

const res = await fetch(API+"/dashboard")
const data = await res.json()

totalHerramientas.innerText = data.totalHerramientas
enBodega.innerText = data.enBodega
enObra.innerText = data.enObra
totalObras.innerText = data.totalObras

}

async function cargarListas(){

const herramientas = await fetch(API+"/herramientas")
const obras = await fetch(API+"/obras")

const dataHerramientas = await herramientas.json()
const dataObras = await obras.json()

selectHerramienta.innerHTML = ""
selectObra.innerHTML = ""

dataHerramientas.forEach(h => {

selectHerramienta.innerHTML += `
<option value="${h.id}">
${h.nombre} (${h.estado})
</option>
`

})

dataObras.forEach(o => {

selectObra.innerHTML += `
<option value="${o.id}">
${o.nombre}
</option>
`

})

}

async function asignar(){

const herramientaId = parseInt(selectHerramienta.value)
const obraId = parseInt(selectObra.value)

await fetch(API+"/asignar",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
herramientaId,
obraId
})

})



alert("Herramienta asignada")

cargarListas()

}

let grafico;

function crearGrafico(enBodega,enObra){

const ctx = document.getElementById('graficoHerramientas').getContext('2d');

if(grafico){
grafico.destroy();
}

grafico = new Chart(ctx,{

type:'doughnut',

data:{
labels:['En Bodega','En Obras'],
datasets:[{
data:[enBodega,enObra]
}]
},

options:{
responsive:true,
plugins:{
legend:{
position:'bottom'
}
}
}

});

}

async function cargarDashboard(){

const res = await fetch(API+"/dashboard")
const data = await res.json()

totalHerramientas.innerText = data.totalHerramientas
enBodega.innerText = data.enBodega
enObra.innerText = data.enObra
totalObras.innerText = data.totalObras

crearGrafico(data.enBodega,data.enObra)

}
cargarDashboard()
cargarListas()
</script>

</body>
</html>
